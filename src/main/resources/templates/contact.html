<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact | Product Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            padding-top: 80px;
            background: linear-gradient(135deg, #4e73df, #6f42c1);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .contact-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .info-box {
            padding: 25px;
            border-radius: 15px;
            background: #f8f9fa;
            transition: 0.3s;
        }

        .info-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .hero-icon {
            font-size: 60px;
            color: #4e73df;
        }
    </style>
</head>

<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="container">

    <!-- Hero Section -->
    <div class="contact-card text-center mb-5">

        <div class="hero-icon mb-3">
            <i class="bi bi-headset"></i>
        </div>

        <h1 class="fw-bold">Contact Us</h1>

        <p class="lead mt-3">
            Have questions? We are here to help you.
        </p>

        <p class="fw-bold">
            Developed by Siva Sai 🚀
        </p>

    </div>

    <!-- Contact Info Section -->
    <div class="row text-center mb-5">

        <div class="col-md-4">
            <div class="info-box">
                <i class="bi bi-envelope-fill fs-1 text-primary"></i>
                <h5 class="mt-3">Email</h5>
                <p>support@productsystem.com</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="info-box">
                <i class="bi bi-telephone-fill fs-1 text-success"></i>
                <h5 class="mt-3">Phone</h5>
                <p>+91 9876543210</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="info-box">
                <i class="bi bi-geo-alt-fill fs-1 text-danger"></i>
                <h5 class="mt-3">Location</h5>
                <p>India</p>
            </div>
        </div>

    </div>

    <!-- Contact Form (UI Only) -->
    <div class="contact-card">

        <h4 class="mb-4 text-center">Send a Message</h4>

        <form>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" placeholder="Your Name">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="email" class="form-control" placeholder="Your Email">
                </div>
            </div>

            <div class="mb-3">
                <textarea class="form-control" rows="4" placeholder="Your Message"></textarea>
            </div>

            <div class="text-center">
                <button type="button" class="btn btn-dark px-4">
                    <i class="bi bi-send-fill"></i> Send Message
                </button>
            </div>
        </form>

    </div>

    <div class="text-center mt-5 mb-5">
        <a th:href="@{/products}" class="btn btn-outline-light px-4">
            <i class="bi bi-arrow-left"></i> Back to Home
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
