<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #667eea, #764ba2); min-height:100vh;">

<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Search Product By ID</h2>

        <form th:action="@{/products/find}" method="get">

            <div class="mb-3">
                <label class="form-label">Product ID</label>
                <input type="number" name="id" class="form-control"
                       placeholder="Enter Product ID" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Search
            </button>

        </form>
    </div>

</div>

</body>
</html>
