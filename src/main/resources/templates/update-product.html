<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:80px; background: linear-gradient(135deg, #667eea, #764ba2); min-height:100vh;">

<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4">Update Product</h2>

        <form th:action="@{/products/save}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control" required />
            </div>

            <div class="mb-3">
                <label>Price</label>
                <input type="number" th:field="*{price}" class="form-control" required />
            </div>

            <div class="mb-3">
                <label>Brand</label>
                <input type="text" th:field="*{brand}" class="form-control" required />
            </div>

            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" th:field="*{quantity}" class="form-control" required />
            </div>

            <!-- Current Image -->
            <div class="mb-3" th:if="${product.imageName != null}">
                <label>Current Image</label><br>
                <img th:src="@{'/images/' + ${product.imageName}}"
                     width="80"
                     class="rounded shadow">
            </div>

            <div class="mb-3">
                <label>Change Image (optional)</label>
                <input type="file" name="imageFile" class="form-control" />
            </div>

            <button type="submit" class="btn btn-success w-100">
                Update Product
            </button>

        </form>
    </div>
</div>

</body>
</html>
