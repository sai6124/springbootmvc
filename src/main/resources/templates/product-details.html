<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #667eea, #764ba2); min-height:100vh;">

<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow p-4 text-center">

        <h2 class="mb-4">Search Result</h2>

        <!-- Product Found -->
        <div th:if="${product != null}">
            <p><b>ID:</b> <span th:text="${product.id}"></span></p>
            <p><b>Name:</b> <span th:text="${product.name}"></span></p>
            <p><b>Price:</b> ₹ <span th:text="${product.price}"></span></p>
            <p><b>Brand:</b> <span th:text="${product.brand}"></span></p>
            <p><b>Quantity:</b> <span th:text="${product.quantity}"></span></p>
        </div>

        <!-- Product Not Found -->
        <div th:if="${product == null}" class="text-danger fw-bold">
            Product not found with ID:
            <span th:text="${id}"></span>
        </div>

        <a th:href="@{/products/search}" class="btn btn-primary mt-3">
            Search Again
        </a>

    </div>

</div>

</body>
</html>
