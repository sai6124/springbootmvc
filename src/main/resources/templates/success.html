<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            color: #28a745;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 25px;
        }

        a {
            text-decoration: none;
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
        }

        a:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>✅ Product Saved Successfully!</h2>
    <p>Your product has been stored in the database.</p>
    <a th:href="@{/products}">Add Another Product</a>
</div>

</body>
</html>
