<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:80px; background: linear-gradient(135deg, #667eea, #764ba2); min-height:100vh;">

<!-- Navbar -->
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5">

    <!-- Success Message -->
    <div th:if="${message}" class="alert alert-success text-center fw-bold">
        <span th:text="${message}"></span>
    </div>

    <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4">All Products</h2>

        <!-- Products Table -->
        <div th:if="${#lists.isEmpty(products) == false}">
            <div class="table-responsive">

                <table class="table table-striped table-hover table-bordered text-center align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Brand</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="product : ${products}">

                            <!-- ID -->
                            <td th:text="${product.id}"></td>

                            <!-- Image -->
                            <td>
                                <div th:if="${product.imageName != null}">
                                    <img th:src="@{'/images/' + ${product.imageName}}"
                                         width="70"
                                         height="70"
                                         class="rounded shadow-sm border">
                                </div>
                                <div th:if="${product.imageName == null}">
                                    <span class="text-muted">No Image</span>
                                </div>
                            </td>

                            <!-- Details -->
                            <td th:text="${product.name}"></td>
                            <td>₹ <span th:text="${product.price}"></span></td>
                            <td th:text="${product.brand}"></td>
                            <td th:text="${product.quantity}"></td>

                            <!-- Action Buttons -->
                            <td>

                                <!-- EDIT -->
                                <a th:href="@{'/products/edit/' + ${product.id}}"
                                   class="btn btn-warning btn-sm me-1">
                                    Edit
                                </a>

                                <!-- DELETE -->
                                <a th:href="@{'/products/delete/' + ${product.id}}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Are you sure you want to delete this product?')">
                                    Delete
                                </a>

                            </td>

                        </tr>
                    </tbody>

                </table>

            </div>
        </div>

        <!-- Empty Message -->
        <div th:if="${#lists.isEmpty(products)}" class="text-center text-danger fw-bold">
            No Products Available
        </div>

        <!-- Add Button -->
        <div class="text-center mt-4">
            <a th:href="@{/products}" class="btn btn-primary">
                Add New Product
            </a>
        </div>

    </div>

</div>

</body>
</html>
