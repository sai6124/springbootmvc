<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Management | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #4e73df, #1cc88a, #36b9cc, #6f42c1);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Icons */
        .floating-icon {
            position: absolute;
            font-size: 40px;
            color: rgba(255,255,255,0.2);
            animation: float 6s ease-in-out infinite;
        }

        .icon1 { top: 10%; left: 20%; animation-delay: 0s; }
        .icon2 { top: 70%; left: 15%; animation-delay: 2s; }
        .icon3 { top: 30%; right: 20%; animation-delay: 4s; }
        .icon4 { bottom: 15%; right: 10%; animation-delay: 1s; }

        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .login-card {
            width: 420px;
            padding: 40px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            color: white;
            animation: fadeIn 1s ease-in-out;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #eee;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            color: white;
            box-shadow: none;
        }

        .btn-login {
            background: linear-gradient(45deg, #f6c23e, #ffffff);
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.05);
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            color: #f8f9fc;
        }
    </style>
</head>

<body>

<!-- Floating Icons -->
<i class="bi bi-box floating-icon icon1"></i>
<i class="bi bi-cart floating-icon icon2"></i>
<i class="bi bi-bar-chart floating-icon icon3"></i>
<i class="bi bi-clipboard-data floating-icon icon4"></i>

<div class="login-card text-center">

    <div class="logo mb-2">
        <i class="bi bi-box-seam"></i> Product Manager
    </div>

    <div class="subtitle mb-4">
        Smart Product Management System
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i> Invalid username or password
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit" class="btn btn-login w-100 mt-3">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>

    </form>

</div>

</body>
</html>
